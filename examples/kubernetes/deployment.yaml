apiVersion: apps/v1
kind: Deployment
metadata:
   name: legion
spec:
   replicas: 1
   selector:
      matchLabels:
         app: legion
   template:
      metadata:
         labels:
            app: legion
      spec:
         containers:
            - name: legion
              image: legion:latest
              ports:
                 - containerPort: 5000
              envFrom:
                 - secretRef:
                      name: legion-secrets
              livenessProbe:
                 httpGet:
                    path: /health
                    port: 5000
                 initialDelaySeconds: 10
              readinessProbe:
                 httpGet:
                    path: /health
                    port: 5000
                 initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata:
   name: legion
spec:
   selector:
      app: legion
   ports:
      - port: 80
        targetPort: 5000
